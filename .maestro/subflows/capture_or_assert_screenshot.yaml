appId: swmansion.enriched.example
---
- tapOn:
    id: "blur-button"

- runFlow:
    when:
      true: ${UPDATE_SCREENSHOTS === "true"}
    commands:
      - takeScreenshot:
          path: "${SCREENSHOT_ROOT}/${maestro.platform}/${SCREENSHOT_NAME}"
          cropOn:
            id: "editor-input"

- runFlow:
    when:
      true: ${UPDATE_SCREENSHOTS !== "true"}
    commands:
      - assertScreenshot:
          path: "${SCREENSHOT_ROOT}/${maestro.platform}/${SCREENSHOT_NAME}"
          thresholdPercentage: 100
          cropOn:
            id: "editor-input"
