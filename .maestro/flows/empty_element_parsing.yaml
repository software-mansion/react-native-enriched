appId: swmansion.enriched.example
platform: android
---
# PR #284 - fix: parsing empty elements
- runFlow:
    when: 
        platform: android
    commands:
        - launchApp
        - tapOn:
            id: "toggle-screen-button"

        - tapOn:
            id: "set-value-button"

        - tapOn:
            id: "value-modal-input"

        - inputText: > 
            <html>
                <p>A</p>
                <p>B</p>
                <p><b>A</b></p>
                <p><b>B</b></p>
                <ul>
                    <li><b>A</b></li>
                    <li><b>B</b></li>
                    <li><b>C</b></li>
                    <li><b></b></li>
                </ul>
                <br>
            </html>

        - tapOn:
            id: "value-modal-submit-button"

        - tapOn:
            id: "size-max-button"

        - runFlow:
            file: "../subflows/capture_or_assert_screenshot.yaml"
            env:
                SCREENSHOT_NAME: "empty_element_parsing"
