appId: swmansion.enriched.example
---
- launchApp

- tapOn:
    id: "toggle-screen-button"

- tapOn:
    id: "editor-input"

- tapOn:
    id: "toolbar-bold"
- inputText: "bold"
- tapOn:
    id: "toolbar-bold"
- inputText: " "

- tapOn:
    id: "toolbar-italic"
- inputText: "italic"
- tapOn:
    id: "toolbar-italic"
- inputText: " "

- tapOn:
    id: "toolbar-underline"
- inputText: "underline"
- tapOn:
    id: "toolbar-underline"
- inputText: " "

- tapOn:
    id: "toolbar-inline-code"
- inputText: "code"
- tapOn:
    id: "toolbar-inline-code"

- tapOn:
    id: "blur-button"


- assertScreenshot:
    path: .maestro/screenshots/inline-styles.png
    thresholdPercentage: 100
    cropOn:
      id: "editor-input"
