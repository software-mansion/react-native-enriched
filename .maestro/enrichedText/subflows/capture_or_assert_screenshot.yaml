appId: swmansion.enriched.example
---
- tapOn:
    id: 'value-modal-submit-button'

- runFlow:
    when:
      true: ${UPDATE_SCREENSHOTS === "true"}
    commands:
      - takeScreenshot:
          path: '${SCREENSHOT_ROOT}/enrichedText/screenshots/${maestro.platform}/${SCREENSHOT_NAME}'
          cropOn:
            id: 'enriched-text-display'

- runFlow:
    when:
      true: ${UPDATE_SCREENSHOTS !== "true"}
    commands:
      - assertScreenshot:
          path: '${SCREENSHOT_ROOT}/enrichedText/screenshots/${maestro.platform}/${SCREENSHOT_NAME}'
          thresholdPercentage: 100
          cropOn:
            id: 'enriched-text-display'
